<section class="tab-content" id="tab-system">
            <div class="section-header">
                <h1>系统状态检查</h1>
                <div class="flex items-center gap-2">
                    <button class="btn btn-ghost" onclick="window._runDeepProbes && window._runDeepProbes()" id="btn-deep-probes">深度检查</button>
                    <button class="btn btn-ghost" onclick="loadSystemDiagnostics()" id="btn-refresh-system">刷新诊断</button>
                </div>
            </div>

            <div class="stats-grid mb-8" id="system-status-grid">
                <div class="stat-card">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-violet-500/20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <div class="stat-value" id="system-overall-status">-</div>
                    <div class="stat-label">系统总体状态</div>
                </div>
                <div class="stat-card stat-failed">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-rose-500/20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <div class="stat-value" id="system-error-count">-</div>
                    <div class="stat-label">存在故障</div>
                </div>
                <div class="stat-card">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-amber-500/20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <div class="stat-value" id="system-warning-count">-</div>
                    <div class="stat-label">系统警告</div>
                </div>
                <div class="stat-card stat-success">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-emerald-500/20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    <div class="stat-value" id="system-ok-count">-</div>
                    <div class="stat-label">正常运行</div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                <div class="card bg-zinc-900 border-white/5 shadow-2xl p-0 rounded-2xl mb-0 overflow-hidden">
                    <div class="card-header pb-3 border-b border-white/5 px-6 pt-6 mb-4">
                        <h2 class="text-zinc-100 font-bold tracking-tight text-lg uppercase">诊断项目检查</h2>
                    </div>
                    <div class="card-body px-6 pb-6" id="system-checks-list">
                        <p class="text-zinc-600 text-sm px-2">尚未加载诊断结果</p>
                    </div>
                </div>

                <div class="card bg-zinc-900 border-white/5 shadow-2xl p-0 rounded-2xl mb-0 overflow-hidden">
                    <div class="card-header pb-3 border-b border-white/5 px-6 pt-6 mb-4">
                        <h2 class="text-zinc-100 font-bold tracking-tight text-lg uppercase">系统路径清单</h2>
                    </div>
                    <div class="card-body px-6 pb-6" id="system-paths-list">
                        <p class="text-zinc-600 text-sm px-2">尚未加载路径信息</p>
                    </div>
                </div>
            </div>

            <div class="card bg-zinc-900 border-white/5 shadow-2xl p-0 rounded-2xl mt-6 mb-0 overflow-hidden">
                <div class="card-header pb-3 border-b border-white/5 px-6 pt-6 mb-4 flex items-center justify-between gap-4">
                    <h2 class="text-zinc-100 font-bold tracking-tight text-lg uppercase">Worker 状态</h2>
                    <button class="btn btn-ghost btn-sm" onclick="window._reconcileStaleWorkerTasks()">清理失联任务</button>
                </div>
                <div class="card-body px-6 pb-6" id="system-workers-list">
                    <p class="text-zinc-600 text-sm px-2">尚未加载 Worker 信息</p>
                </div>
            </div>

            <div class="card bg-zinc-900 border-white/5 shadow-2xl p-0 rounded-2xl mt-6 mb-0 overflow-hidden">
                <div class="card-header pb-3 border-b border-white/5 px-6 pt-6 mb-4 flex items-center justify-between gap-4">
                    <h2 class="text-zinc-100 font-bold tracking-tight text-lg uppercase">Deep Probes</h2>
                    <span class="text-[10px] text-zinc-500 uppercase tracking-widest">opt-in network / API</span>
                </div>
                <div class="card-body px-6 pb-6" id="system-probes-list">
                    <p class="text-zinc-600 text-sm px-2">尚未运行深度检查。点击「深度检查」探测 API / 网络 / Session 资产。</p>
                </div>
            </div>

            <div class="card bg-zinc-900 border-white/5 shadow-2xl p-0 rounded-2xl mt-6 mb-0 overflow-hidden">
                <div class="card-header pb-3 border-b border-white/5 px-6 pt-6 mb-4">
                    <h2 class="text-zinc-100 font-bold tracking-tight text-lg uppercase">Session Diagnostics</h2>
                </div>
                <div class="card-body px-6 pb-6" id="system-session-list">
                    <p class="text-zinc-600 text-sm px-2">尚未加载 Session 信息</p>
                </div>
            </div>
            <div class="card bg-zinc-900 border-white/5 shadow-2xl p-0 rounded-2xl mt-6 mb-0 overflow-hidden">
                <div class="card-header pb-3 border-b border-white/5 px-6 pt-6 mb-4">
                    <h2 class="text-zinc-100 font-bold tracking-tight text-lg uppercase">Session Inventory</h2>
                </div>
                <div class="card-body px-6 pb-6" id="system-session-inventory-list">
                    <p class="text-zinc-600 text-sm px-2">No persisted session inventory available.</p>
                </div>
            </div>
        </section>
