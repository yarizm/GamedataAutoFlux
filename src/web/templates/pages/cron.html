<section class="tab-content" id="tab-cron">
            <div class="section-header">
                <h1 data-i18n="cron.title">定时任务</h1>
                <button class="btn btn-primary" onclick="showCreateCronModal()" id="btn-create-cron">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span data-i18n="cron.create">+ 添加定时任务</span>

            </div>

                </div>
                <div class="card-body px-6 pb-6" id="cron-list">
                    <p class="text-zinc-600 text-sm" data-i18n="cron.empty">暂无定时任务</p>
                </div>
            </div>
