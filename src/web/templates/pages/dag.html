<section class="tab-content" id="tab-dag">
            <div class="section-header">
                <h1>DAG 编辑器</h1>
                <div class="flex items-center gap-2 flex-wrap">
                    <input id="dag-name-input" type="text" placeholder="DAG 名称" class="input h-9 w-40 text-sm" />
                    <button class="btn btn-ghost" id="btn-dag-validate" type="button">校验</button>
                    <button class="btn btn-secondary" id="btn-dag-fit" type="button">适应画布</button>
                    <button class="btn btn-secondary" id="btn-dag-clear" type="button">清空</button>
                    <button class="btn btn-primary" id="btn-dag-save" type="button">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        保存 DAG
                    </button>
                </div>
            </div>

            <div id="dag-validate-bar" class="text-xs text-zinc-500 mb-2 px-1"></div>

            <div class="dag-layout grid grid-cols-12 gap-4">
                <aside class="col-span-3 space-y-4">
                    <div class="card bg-zinc-900 border-white/5 rounded-2xl p-4">
                        <div class="flex items-center justify-between mb-3">
                            <h2 class="text-zinc-100 font-bold tracking-tight text-sm uppercase">已保存</h2>
                            <button type="button" class="text-zinc-500 hover:text-sky-400 text-[10px]" id="btn-dag-refresh-list" title="刷新列表">刷新</button>
                        </div>
                        <div id="dag-saved-list" class="space-y-1 max-h-48 overflow-y-auto">
                            <p class="text-zinc-600 text-xs">加载中...</p>
                        </div>
                        <p class="text-zinc-600 text-[10px] mt-2">保存后会出现在此列表，也可在「创建任务」中选择</p>
                    </div>
                    <div class="card bg-zinc-900 border-white/5 rounded-2xl p-4">
                        <h2 class="text-zinc-100 font-bold tracking-tight text-sm uppercase mb-3">节点库</h2>
                        <div id="dag-palette" class="space-y-2 max-h-[40vh] overflow-y-auto">
                            <p class="text-zinc-600 text-xs">加载中...</p>
                        </div>
                    </div>
                </aside>

                <main class="col-span-6 card bg-zinc-900 border-white/5 rounded-2xl p-0 overflow-hidden">
                    <div class="card-header px-4 pt-4 pb-2 border-b border-white/5 flex items-center justify-between">
                        <h2 class="text-zinc-100 font-bold tracking-tight text-sm uppercase">画布</h2>
                        <span class="text-zinc-600 text-[10px]">空白处/中键/空格+拖 平移 · 滚轮缩放 · 端口连线 · 右侧映射上游字段</span>

                    </div>
                    <div id="dag-canvas-wrap" class="dag-canvas-wrap relative" style="height: 65vh;">
                        <div id="drawflow" class="w-full h-full"></div>
                    </div>
                </main>

                <aside class="col-span-3">
                    <div class="card bg-zinc-900 border-white/5 rounded-2xl p-4" id="dag-inspector">
                        <p class="text-zinc-600 text-xs">选中节点或边以编辑属性</p>
                    </div>
                </aside>
            </div>
        </section>
