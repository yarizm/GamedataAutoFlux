<section class="tab-content active" id="tab-dashboard">
            <div class="section-header">
                <h1>系统概览</h1>
                <button class="btn btn-ghost" onclick="refreshDashboard()" id="btn-refresh-dashboard">刷新</button>
            </div>

            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-zinc-700/50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">任务总数</div>
                </div>
                <div class="stat-card stat-running">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-cyan-500/20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <div class="stat-value" id="stat-running">-</div>
                    <div class="stat-label">运行中</div>
                </div>
                <div class="stat-card stat-success">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-emerald-500/20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <div class="stat-value" id="stat-success">-</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-card stat-failed">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-rose-500/20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <div class="stat-value" id="stat-failed">-</div>
                    <div class="stat-label">失败</div>
                </div>
                <div class="stat-card">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-zinc-700/50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <div class="stat-value" id="stat-cron">-</div>
                    <div class="stat-label">定时任务</div>
                </div>
                <div class="stat-card">
                    <svg class="absolute top-4 right-4 w-6 h-6 text-violet-500/20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <div class="stat-value" id="stat-components">-</div>
                    <div class="stat-label">已注册组件</div>
                </div>
            </div>

            <!-- Asymmetric Grid for Charts and Tables -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
                <!-- ECharts 图表容器 -->
                <div class="card lg:col-span-1 mb-0">
                    <div class="card-header pb-3 border-b border-white/5 px-6 pt-6 mb-4">
                        <h2 class="text-theme-primary font-bold tracking-tight text-lg uppercase">任务执行趋势</h2>
                    </div>
                    <div class="card-body h-[300px] flex items-center justify-center p-0">
                        <div id="dashboard-chart" class="w-full h-full"></div>
                    </div>
                </div>

                <div class="card lg:col-span-2 mb-0">
                    <div class="card-header pb-3 border-b border-white/5 px-6 pt-6 mb-4">
                        <h2 class="text-theme-primary font-bold tracking-tight text-lg uppercase">最近任务</h2>
                    </div>
                    <div class="card-body overflow-x-auto px-6 pb-6">
                        <table class="table" id="recent-tasks-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>名称</th>
                                    <th>状态</th>
                                    <th>进度</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="recent-tasks-body">
                                <tr><td colspan="6" class="text-muted">暂无任务</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
