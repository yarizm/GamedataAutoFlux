name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "src/web/package-lock.json"

      - name: Install Python package (dev extras)
        run: pip install -e ".[dev]"

      - name: Compile sources
        run: python -m compileall src/

      - name: Ruff (src)
        run: ruff check src/

      - name: Agent workflow suite
        # Path workflows (report/review/pipeline/readiness/cron/multisource) + meta/routing
        run: >
          pytest -q --tb=line
          tests/test_agent_workflow_cron.py
          tests/test_agent_workflow_multisource.py
          tests/test_agent_workflow_readiness.py
          tests/test_agent_workflow_events.py
          tests/test_agent_workflows.py
          tests/test_agent_workflow_matchers.py
          tests/test_agent_workflow_routing.py
          tests/test_agent_workflow_bridge_events.py
          tests/test_agent_workflow_result_cards.py
          tests/test_agent_workflow_runtime_nodes.py
          tests/test_agent_stream_events.py

      - name: Unit tests (skip integration)
        # Default CI gate: no live external services
        run: pytest -m "not integration" -q --tb=line

      - name: Legacy static script syntax
        run: node --check src/web/static/app.js

      - name: Frontend install & production build
        working-directory: src/web
        run: |
          npm ci
          npm run build
