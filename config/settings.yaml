# GamedataAutoFlux global configuration

app:
  name: "GamedataAutoFlux"
  version: "0.1.0"
  debug: true

server:
  host: "127.0.0.1"
  port: 8000
  api_key: ""
  cors_origins:
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"

database:
  provider: "sqlalchemy"
  sqlalchemy_url: "${DATABASE_URL}"

llm:
  provider: sensenova_deepseek
  qwen:
    model: qwen-max
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: ${DASHSCOPE_API_KEY}
    temperature: 0.3
    max_tokens: 2000
    fallback_to_stub: true
    retry_count: 2
    retry_delay: 2.0
    timeout: 180
    max_input_chars: 18000
  deepseek:
    model: deepseek-chat
    base_url: https://api.deepseek.com
    api_key: ${DEEPSEEK_API_KEY}
    temperature: 0.3
    max_tokens: 2000
    fallback_to_stub: true
    timeout: 60
  sense:
    model: sensenova-6.7-flash-lite
    base_url: https://token.sensenova.cn/v1
    api_key: ${SENSE_API_KEY}
    temperature: 0.3
    max_tokens: 2000
    fallback_to_stub: true
    retry_count: 2
    retry_delay: 2.0
    timeout: 180
    max_input_chars: 18000
  sensenova_deepseek:
    model: deepseek-v4-flash
    base_url: https://token.sensenova.cn/v1
    api_key: ${SENSE_API_KEY}
    temperature: 0.3
    max_tokens: 2000
    fallback_to_stub: true
    retry_count: 2
    retry_delay: 2.0
    timeout: 180
    max_input_chars: 18000
agent:
  enabled: true
  agent_type: openai_tools
  max_iterations: 40
  session_timeout_minutes: 60
  playwright_mcp:
    enabled: true
    command: "npx"
    args: ["-y", "@playwright/mcp"]
    headless: true
    max_exploration_steps: 20
  system_prompt: |-
    你是一个游戏数据采集与分析系统的 AI 助手。
    你可以帮助用户查看和管理任务、配置 Pipeline、设置定时采集、
    浏览数据以及生成报告。
    请根据用户的自然语言指令，选择合适的工具完成任务。

    ## Playwright 浏览器探索与动态采集规则
    当用户要求采集某个网址的数据（但系统没有内置采集器）时，必须严格执行以下 **4步状态机** 流程：

    1. **Navigate (页面导航)**:
       - 使用 `browser_navigate` 打开目标网页 URL。
    2. **Evaluate (脚本评估与测试)**:
       - 调用 `browser_snapshot` 查看页面 DOM 结构，识别数据所在的元素。
       - 调用 `browser_evaluate` 执行 JavaScript 测试数据提取。
       - **注意**: 执行提取脚本时，必须将代码作为 `function` 参数传入，而不是 `code`。例如: `browser_evaluate({{"function": "() => {{ return {{ title: document.title }}; }}"}})`。
       - **防截断与语法错误**: JS 脚本应尽量保持精简、单行，避免过长的复杂逻辑。确保 JSON 参数内的代码引号转义正确。
       - 验证返回值是否能获取到有效数据。若失败，调整 JS 脚本，最多重试 2 次（防止无限循环）。若 2 次重试仍未成功获取核心数据，应立刻停下来告知用户遇到的问题，等待用户指示。
    3. **元素交互故障转移 (Fallback)**:
       - 调用 `browser_type` 或 `browser_click` 时，若因为页面变化导致 `[ref=x]` 报错找不到元素，请优先尝试标准的 CSS 选择器（如 `input[type="text"]`, `#search` 等），或重新执行 `browser_snapshot` 获取最新快照后再试。
    4. **Create Dynamic Pipeline (创建动态流水线)**:
       - 成功测试提取脚本后，**必须**使用 `create_dynamic_pipeline` 工具创建 Pipeline。
       - **绝对禁止**对动态网页采集使用 `create_pipeline` 工具，因为其 steps 参数结构过于复杂，容易生成错误格式。
       - 调用 `create_dynamic_pipeline` 时，填入 `pipeline_name`, `url`, `js_script`（使用步骤2测试成功的 JS 脚本），以及合适的 `wait_strategy_type`（推荐 `networkidle`）。
    5. **Create Task (创建采集任务)**:
       - 调用 `create_task` 提交并运行刚创建的动态 Pipeline。
       - `targets[0].name` 必须是清晰的游戏名称（如"原神"、"三角洲行动"），不能是数据源描述（如"原神官网新闻"、"steamcharts data"）。

    重要规则 —— 创建 Steam 采集任务时：
    1. 必须先调用 resolve_steam_app_id 搜索正确的 app_id
    2. 不要凭记忆猜测 app_id，LLM 记忆经常出错
    3. 如果搜索结果有多个匹配，选择匹配度最高的（精确匹配 > 模糊匹配）

    ## 游戏标识符自动发现规则
    1. 当用户请求采集数据但未提供平台标识符时，必须先调用 search_game_identifiers 自动发现所有标识符。
    2. 重要：调用 search_game_identifiers 时，参数 platforms 必须是原生的 JSON 数组列表格式，例如 ["official_site", "steam"]。绝对不要传入带方括号的字符串（如 "['official_site']"）。
    3. 审查搜索结果：
       - 所有平台的置信度都是 HIGH → 自动填充并创建任务，无需询问用户
       - 任何平台 MEDIUM → 在回复中展示候选项，请求用户确认后再继续
       - 任何平台 LOW 或未找到 → 告知用户并建议补充标识符
    3. 跨平台采集时，应为每个平台创建独立的任务（steam_basic / taptap_basic 等）。

    ## 结果审查规则
    1. 任务完成后，如果用户询问数据质量，调用 review_collection_results 检查。
    2. 审查发现问题时，使用 search_game_identifiers 重新发现标识符 → 修正 → 重新创建任务。
    3. 单个任务最多重试 3 次，超过后标记失败并输出原因。

    如果意图不明确，请主动询问细节。
    所有响应请使用中文。

steam:
  api_key: "${STEAM_API_KEY}"
  request_delay: 1.5
  max_reviews: 200
  review_language: "all"
  review_trend_mode: "summary"
  review_trend_days: 90
  review_summary_concurrency: 4
  max_review_trend_reviews: 10000
  steamdb:
    enabled: true
    cdp_enabled: true
    cdp_port: 9222
    cdp_profile_dir: "data/steamdb_profile"
    request_delay: 8.0
    request_jitter: 4.0
    page_delay: 5.0
    max_games_per_session: 10
    headless: true
    timeout: 30000
    cookie: "${STEAMDB_COOKIE}"
    headers: {}

steam_discussions:
  request_delay: 2.0
  timeout: 30
  max_pages: 50
  max_topics: 1000
  include_replies: true
  max_reply_pages: 5

taptap:
  base_url: "https://www.taptap.cn"
  timeout: 20
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"
  request_delay: 1.5
  request_retries: 2
  playwright_enabled: true
  headless: true
  playwright_timeout: 30000
  firecrawl_enabled: false
  reviews_limit_default: 20
  reviews_pages_default: 1
  save_raw_snapshots: true

qimai:
  headless: true
  cdp_enabled: true
  cdp_port: 9222
  cdp_required: false
  timeout: 45000
  # 七麦有较严格的访问频控。页面间延迟、点击后等待和随机抖动会显著降低连续请求特征。
  request_delay: 8.0
  request_jitter: 4.0
  click_delay: 1.5
  scroll_delay: 2.0
  max_api_payloads: 180

official_site:
  timeout: 20
  request_delay: 0.5
  max_pages: 80
  max_depth: 2
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  playwright_enabled: true
  headless: true
  playwright_timeout: 30000
  include_patterns:
    - "news"
    - "update"
    - "patch"
    - "event"
    - "notice"
    - "announcement"
    - "新闻"
    - "资讯"
    - "公告"
    - "活动"
    - "更新"
    - "赛事"
  exclude_patterns:
    - "privacy"
    - "terms"
    - "support"
    - "login"
    - "account"
    - "shop"
    - "cart"
  recipes:
    "三角洲行动":
      official_url: "https://df.qq.com/"
      use_playwright: "auto"
      max_pages: 80
      max_depth: 2
      since_days: 90
      validation_status: "verified"
      validation_notes: "已验证可采集近 90 天新闻、版本更新和活动。"
    "永劫无间":
      official_url: "https://www.yjwujian.cn/news/"
      use_playwright: "never"
      max_pages: 60
      max_depth: 1
      since_days: 90
      validation_status: "partial"
      validation_notes: "可采集新闻和版本更新，官网可见范围不足完整 90 天时按页面实际内容返回。"
    "Arc Raiders":
      official_url: "https://arcraiders.com/news/"
      use_playwright: "never"
      max_pages: 25
      max_depth: 1
      since_days: 90
      validation_status: "verified"
      validation_notes: "已验证可采集近 90 天 patch/news 页面。"
