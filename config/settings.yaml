# GamedataAutoFlux global configuration

app:
  name: "GamedataAutoFlux"
  version: "0.1.0"
  debug: true

server:
  host: "0.0.0.0"
  port: 8000

database:
  url: "sqlite+aiosqlite:///data/autoflux.db"
  json_store_dir: "data/results"

vector_store:
  provider: "local"
  local:
    db_name: "vector_store.db"
    json_dir: "vector_records"
    fallback_to_stub: true

embedding:
  provider: "qwen"
  qwen:
    api_key: "${DASHSCOPE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/api/v1"
    model: "text-embedding-v4"
    dimensions: 1024
    text_type: "document"
    output_type: "dense"
    instruct: null
    timeout: 30
    fallback_to_stub: true
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "text-embedding-3-small"
  local:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"

llm:
  provider: "qwen"
  qwen:
    api_key: "${DASHSCOPE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-max"
    temperature: 0.3
    max_tokens: 2000
    max_input_chars: 18000
    retry_count: 2
    retry_delay: 2.0
    timeout: 180
    fallback_to_stub: true
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    temperature: 0.3
    max_tokens: 1200
    timeout: 60
    fallback_to_stub: true
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
  local:
    base_url: "http://localhost:11434/v1"
    model: "qwen2.5"

steam:
  api_key: "${STEAM_API_KEY}"
  request_delay: 1.5
  max_reviews: 200
  review_language: "all"
  review_trend_mode: "summary"
  review_trend_days: 90
  review_summary_concurrency: 4
  max_review_trend_reviews: 10000
  steamdb:
    enabled: true
    request_delay: 3.0
    headless: true
    timeout: 30000
    cookie: "${STEAMDB_COOKIE}"
    headers: {}

steam_discussions:
  request_delay: 2.0
  timeout: 30
  max_pages: 50
  max_topics: 1000
  include_replies: true
  max_reply_pages: 5

taptap:
  base_url: "https://www.taptap.cn"
  timeout: 20
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"
  request_delay: 1.5
  request_retries: 2
  playwright_enabled: true
  headless: true
  playwright_timeout: 30000
  firecrawl_enabled: false
  reviews_limit_default: 20
  reviews_pages_default: 1
  save_raw_snapshots: true

qimai:
  headless: true
  timeout: 45000
  # 七麦有较严格的访问频控。页面间延迟、点击后等待和随机抖动会显著降低连续请求特征。
  request_delay: 8.0
  request_jitter: 4.0
  click_delay: 1.5
  scroll_delay: 2.0
  max_api_payloads: 80

monitor:
  default_days: 30
  timezone: "Asia/Shanghai"
  request_delay: 1.5
  metric_concurrency: 4
  sully_siteurl_overrides:
    "2507950": "delta_force_hawk_ops"
    "Delta Force": "delta_force_hawk_ops"
    "三角洲行动": "delta_force_hawk_ops"

firecrawl:
  api_key: "${FIRECRAWL_API_KEY}"
  timeout: 30
  cookie: "${STEAMDB_COOKIE}"
  headers: {}

gtrends:
  geo: "" # Default to global
  hl: "zh-CN" # Language
  timeframe: "today 12-m" # Default time slice
  proxies: [] # Provide a list of proxies to avoid 429 errors, e.g. ["https://34.203.233.13:80"]
  retries: 2
  backoff_factor: 0.5

scheduler:
  max_concurrent_tasks: 5
  default_retry_count: 3
  default_retry_delay: 60
  persistence:
    db_name: "scheduler.db"
    json_dir: "scheduler_tasks"
  cron_jobs: []

collector:
  request_timeout: 30
  request_delay: 2
  proxy: null
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

logging:
  level: "DEBUG"
  log_dir: "logs"
  rotation: "10 MB"
  retention: "30 days"
