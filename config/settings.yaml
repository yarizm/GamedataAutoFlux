# GamedataAutoFlux global configuration

app:
  name: "GamedataAutoFlux"
  version: "0.1.0"
  debug: true

server:
  host: "0.0.0.0"
  port: 8000

database:
  url: "sqlite+aiosqlite:///data/autoflux.db"
  json_store_dir: "data/results"

vector_store:
  provider: "local"
  local:
    db_name: "vector_store.db"
    json_dir: "vector_records"
    fallback_to_stub: true

embedding:
  provider: "qwen"
  qwen:
    api_key: "${DASHSCOPE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/api/v1"
    model: "text-embedding-v4"
    dimensions: 1024
    text_type: "document"
    output_type: "dense"
    instruct: null
    timeout: 30
    fallback_to_stub: true
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "text-embedding-3-small"
  local:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"

llm:
  provider: "deepseek"
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    temperature: 0.3
    max_tokens: 1200
    timeout: 60
    fallback_to_stub: true
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
  local:
    base_url: "http://localhost:11434/v1"
    model: "qwen2.5"

steam:
  api_key: "${STEAM_API_KEY}"
  request_delay: 1.5
  max_reviews: 200
  review_language: "all"
  steamdb:
    enabled: true
    request_delay: 3.0
    headless: true
    timeout: 30000

taptap:
  base_url: "https://www.taptap.cn"
  timeout: 20
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"
  request_delay: 1.5
  request_retries: 2
  playwright_enabled: true
  headless: true
  playwright_timeout: 30000
  firecrawl_enabled: true
  reviews_limit_default: 20
  reviews_pages_default: 1
  save_raw_snapshots: true

firecrawl:
  api_key: "${FIRECRAWL_API_KEY}"
  timeout: 30

scheduler:
  max_concurrent_tasks: 5
  default_retry_count: 3
  default_retry_delay: 60
  persistence:
    db_name: "scheduler.db"
    json_dir: "scheduler_tasks"
  cron_jobs: []

collector:
  request_timeout: 30
  request_delay: 2
  proxy: null
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

logging:
  level: "DEBUG"
  log_dir: "logs"
  rotation: "10 MB"
  retention: "30 days"
